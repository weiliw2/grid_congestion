markets:
  PJM:
    timezone: America/New_York
    raw_subdir: pjm
    interval_minutes: 60
    hub_reference:
      match_column: node_name
      match_values:
        - Western Hub
        - West Hub
        - PJM West Hub
    notes: PJM nodal data should be normalized to a standard hourly timestamp.
  ERCOT:
    timezone: America/Chicago
    raw_subdir: ercot
    interval_minutes: 60
    hub_reference:
      match_column: node_name
      match_values:
        - North Hub
        - ERCOT North Hub
    notes: ERCOT settlement point or node data should be harmonized into the shared schema.
